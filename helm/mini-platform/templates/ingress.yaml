{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mini-platform.fullname" . }}-ingress
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ required "ingress.host must be set when ingress in enabled" .Values.ingress.host | quote}} 
      http:
        paths:
         - path: /
           pathType: Prefix
           backend:
             service:
               name: {{ include "mini-platform.fullname" . }}-api
               port:
                 number: {{ .Values.api.service.port }}
{{- end -}}