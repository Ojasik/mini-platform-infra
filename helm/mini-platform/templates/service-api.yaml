apiVersion: v1
kind: Service
metadata:
  name: {{ include "mini-platform.fullname" . }}-api
spec:
  selector:
    app: mini-platform-api
    release: {{ .Release.Name }}
  ports:
  - port: {{ .Values.api.service.port }}
    targetPort: {{ .Values.api.service.targetPort }}
    name: http
    protocol: TCP
  type: {{ .Values.api.service.type }}