apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mini-platform.fullname" . }}-api
  labels:
    app: mini-platform-api
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: mini-platform-api
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: mini-platform-api
        release: {{ .Release.Name }}
    spec:       
      containers:
        - name: mini-platform-api
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "mini-platform.fullname" . }}-config
          readinessProbe:
            httpGet: 
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10