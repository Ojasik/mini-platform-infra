apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-platform-api
  labels:
    app: mini-platform-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mini-platform-api
  template:
    metadata:
      labels:
        app: mini-platform-api
    spec:       
      containers:
        - name: mini-platform-api
          imagePullPolicy: Always
          image: ghcr.io/ojasik/mini-platform:75347dc333ab210c53850b1d730f3e6db5de69a3
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: mini-platform-config
          readinessProbe:
            httpGet: 
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10